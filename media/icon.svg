<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- 배경 -->
  <rect width="128" height="128" fill="#0E639C" rx="24"/>

  <!-- 파일 아이콘 -->
  <g transform="translate(32, 24)">
    <!-- 파일 본체 -->
    <path d="M 8 0 L 32 0 L 40 8 L 40 56 L 0 56 L 0 0 Z" fill="white" opacity="0.9"/>
    <!-- 파일 접기 -->
    <path d="M 32 0 L 40 8 L 32 8 Z" fill="#0E639C"/>

    <!-- 줄 1 -->
    <rect x="4" y="16" width="28" height="2" fill="#0E639C"/>
    <!-- 줄 2 -->
    <rect x="4" y="24" width="28" height="2" fill="#0E639C"/>
    <!-- 줄 3 -->
    <rect x="4" y="32" width="20" height="2" fill="#0E639C"/>

    <!-- 강조선 (줄번호) -->
    <g transform="translate(0, 42)">
      <text x="5" y="8" font-size="10" font-weight="bold" fill="#007ACC" font-family="monospace">42</text>
    </g>
  </g>

  <!-- 클립보드 아이콘 -->
  <g transform="translate(64, 64)">
    <rect x="2" y="8" width="24" height="28" fill="none" stroke="white" stroke-width="2" rx="2"/>
    <rect x="6" y="2" width="16" height="6" fill="white" opacity="0.7" rx="1"/>
    <line x1="8" y1="14" x2="22" y2="14" stroke="white" stroke-width="1.5"/>
    <line x1="8" y1="20" x2="22" y2="20" stroke="white" stroke-width="1.5"/>
    <line x1="8" y1="26" x2="18" y2="26" stroke="white" stroke-width="1.5"/>
  </g>
</svg>
